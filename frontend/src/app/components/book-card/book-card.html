<div class="card h-100" *ngIf="book" [routerLink]="['/book', book._id]" style="cursor: pointer;">
  <div class="position-relative">
    <img [src]="book.imageUrl || 'https://via.placeholder.com/300x400?text=No+Cover'" 
         class="card-img-top" 
         alt="{{book.title}}"
         style="height: 250px; object-fit: cover;">
    <span class="badge bg-primary position-absolute top-0 end-0 m-2 px-2 py-1 shadow-sm">{{book.genre}}</span>
  </div>
  <div class="card-body d-flex flex-column">
    <h5 class="card-title fw-bold mb-1 text-truncate" [title]="book.title">{{book.title}}</h5>
    <h6 class="card-subtitle mb-3 text-muted" style="font-size: 0.9rem;">by {{book.author}}</h6>
    <div class="mt-auto pt-3">
        <span *ngIf="book.category !== 'Standard'" class="badge bg-danger bg-opacity-10 text-danger border border-danger-subtle ms-auto">
            ✨ {{book.category}}
        </span>
    </div>
  </div>
</div>
